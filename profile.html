<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - PathSync AI</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav></nav>

    <div class="container">
        <h1>Profile <span class="highlight-gradient">Settings</span></h1>

        <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="width: 100px; height: 100px; background: var(--primary); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 2rem;">👨‍🎓</div>
                <h2>Alex Student</h2>
                <p style="color: var(--text-muted);">alex@pathsync.com</p>
            </div>

            <form>
                <label>Career Goal</label>
                <select>
                    <option>AI Engineer</option>
                    <option>Full Stack Developer</option>
                    <option>Data Scientist</option>
                </select>

                <label>Preferred Language</label>
                <select>
                    <option>English</option>
                    <option>Spanish</option>
                    <option>French</option>
                </select>

                <label>Daily Learning Goal (Hours)</label>
                <input type="number" value="2" min="1" max="12">

                <button type="button" onclick="alert('Settings Saved!')" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Save Changes</button>
            </form>
        </div>
    </div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
</body>
</html>
