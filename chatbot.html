<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mentor - PathSync AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Spinner Animation */
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite both;
            margin: 0 2px;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <nav></nav>

    <div class="container">
        <h1>AI Career <span class="highlight-gradient">Mentor</span></h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Powered by Real-Time AI. Ask anything about your career.</p>

        <div class="glass-card" style="height: 65vh; display: flex; flex-direction: column;">
            <div id="chatDisplay" class="chat-box" style="flex-grow: 1; overflow-y: auto;">
                <div id="loading" style="display:none;">
                  AI is thinking...
                </div>
                <div class="msg msg-ai">
                    Hello! I'm your AI Career Mentor. Ask me about interview prep, skill development, or your career path!
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="text" id="userInput" placeholder="Type your message..." style="margin-bottom: 0;" onkeypress="handleEnter(event)">
                <button onclick="sendChatMessage()" class="btn btn-primary">Send</button>
            </div>
        </div>
    </div>
    <script>
        function handleEnter(e) {
            if(e.key === 'Enter') sendChatMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const display = document.getElementById('chatDisplay');
            const text = input.value.trim();
            
            if(!text) return;

            // Add User Message
            display.innerHTML += `<div class="msg msg-user">${text}</div>`;
            input.value = '';

            // Show Loading Animation
            const loadingId = 'loading-' + Date.now();
            display.innerHTML += `
                <div class="msg msg-ai typing-indicator" id="${loadingId}">
                    <span></span><span></span><span></span>
                </div>
            `;
            display.scrollTop = display.scrollHeight;

            try {
                // Get AI Response using API
                const response = await getAIResponse(text);
                
                // Remove Loading Animation
                const loadingEl = document.getElementById(loadingId);
                if(loadingEl) loadingEl.remove();

                // Add AI Message
                display.innerHTML += `<div class="msg msg-ai">${response}</div>`;
            } catch (error) {
                const loadingEl = document.getElementById(loadingId);
                if(loadingEl) loadingEl.remove();
                display.innerHTML += `<div class="msg msg-ai" style="color: #ff4757;">Error: Could not connect to AI. Check API Key in app.js</div>`;
            }
            
            // Scroll to bottom
            display.scrollTop = display.scrollHeight;
        }
    </script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>
</html>
