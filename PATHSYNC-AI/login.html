<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PathSync AI</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
        <div class="logo">PathSync AI</div>
        <div class="nav-links"><a href="index.html">Home</a></div>
    </nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="glass-card" style="width: 100%; max-width: 400px; padding: 3rem;">
            <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
            <form onsubmit="App.login(event)">
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1rem; color: var(--text-muted);">
                Don't have an account? <a href="login.html" style="color: var(--accent);">Sign up</a>
            </p>
        </div>
    </div>
    
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
</body>
</html>
